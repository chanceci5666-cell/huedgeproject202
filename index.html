<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>慈航普度 - 诚心礼佛，广结善缘</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #b71c1c;    /* 深朱红 */
            --secondary: #d4af37;  /* 佛经金 */
            --light: #fff8e1;      /* 浅檀香色 */
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Serif SC', serif;
        }

        body, html {
            height: 100%;
            overflow: hidden; /* 禁止下拉滚动 */
            background-color: var(--light);
        }

        /* 全屏背景图 */
        .full-screen-bg {
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.5)), 
                        url('https://images.unsplash.com/photo-1528662096024-5dc5a6230cc3?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航简版 */
        header {
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            color: var(--secondary);
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        nav a {
            color: var(--white);
            text-decoration: none;
            margin-left: 2rem;
            font-size: 1rem;
            transition: color 0.3s;
            border-bottom: 1px solid transparent;
        }

        nav a:hover {
            color: var(--secondary);
            border-bottom: 1px solid var(--secondary);
        }

        /* 核心内容区 */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero-box {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(8px);
            padding: 3rem;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 4px;
            max-width: 800px;
        }

        h1 {
            color: var(--secondary);
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            letter-spacing: 8px;
        }

        p {
            color: var(--white);
            font-size: 1.25rem;
            margin-bottom: 2.5rem;
            line-height: 2;
            letter-spacing: 2px;
        }

        .cta-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            padding: 0.8rem 2.5rem;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            letter-spacing: 2px;
        }

        .btn-primary {
            background-color: var(--secondary);
            color: #3e2723;
        }

        .btn-outline {
            border: 1px solid var(--secondary);
            color: var(--secondary);
        }

        .btn:hover {
            transform: translateY(-3px);
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* 底部版权简版 */
        footer {
            padding: 1.5rem;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; letter-spacing: 4px; }
            p { font-size: 1rem; }
            header { flex-direction: column; gap: 1rem; }
            nav a { margin: 0 0.5rem; }
            .cta-group { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="full-screen-bg">
        <header>
            <div class="logo">
                <i class="fas fa-om"></i>
                <span>慈航普度</span>
            </div>
            <nav>
                <a href="#">首页</a>
                <a href="#">礼佛法门</a>
                <a href="#">在线祈愿</a>
            </nav>
        </header>

        <main>
            <div class="hero-box">
                <h1>诚心礼佛 广结善缘</h1>
                <p>
                    大慈大悲，救苦救难。<br>
                    在喧嚣尘世中寻找心灵的净土，通过一炷清香、一份诚心，<br>
                    祈愿众生离苦得乐，福慧双增。
                </p>
                <div class="cta-group">
                    <a href="#" class="btn btn-primary">在线祈福点灯</a>
                    <a href="#" class="btn btn-outline">助印流通经书</a>
                </div>
            </div>
        </main>

        <footer>
            &copy; 2026 慈航普度文化传播 · 愿此功德 普及于一切
        </footer>
    </div>

</body>
</html>
